<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocTools // Student Utility</title>
    <meta name="description" content="A minimalist, secure utility to merge and convert presentations and documents instantly in your browser.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <main class="app-container" id="main-container">
        <header class="app-header">
            <div class="tag">STUDENT UTILITY V2.1.3</div>
            <h1>DocTools</h1>
            <p>Merge & convert your assignments locally. Fast, private, no BS.</p>
        </header>

        <nav class="tabs" aria-label="Tool Selection">
            <button id="tab-merge-pptx" class="tab-btn active" data-action="merge_pptx">
                <span class="tab-icon">📄</span> Merge PPTX
            </button>
            <button id="tab-convert-pdf" class="tab-btn" data-action="convert_pdf">
                <span class="tab-icon">✨</span> PPTX ➔ PDF
            </button>
            <button id="tab-convert-docx" class="tab-btn" data-action="convert_docx">
                <span class="tab-icon">📝</span> DOCX ➔ PDF
            </button>
            <button id="tab-merge-pdf" class="tab-btn" data-action="merge_pdf">
                <span class="tab-icon">📚</span> Merge PDF
            </button>
        </nav>

        <section class="upload-section" aria-label="File Upload and Processing">
            <div id="drop-zone" class="drop-zone" tabindex="0">
                <div class="drop-zone-content">
                    <div class="drop-icon-wrapper">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <h2>Drop files here</h2>
                    <p>or click to browse your computer</p>
                </div>
                <input type="file" id="file-input" multiple hidden>
            </div>
            
            <div id="file-list" class="file-list"></div>
            
            <div class="actions">
                <button id="process-btn" class="process-btn" disabled>Select files to start</button>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Processing locally...</p>
            </div>
            
            <div id="error-msg" class="error-msg hidden"></div>
        </section>

        <footer class="app-footer">
            <p>🔒 100% Local Processing. Your files never leave this device.</p>
        </footer>
    </main>

    <script src="/static/app.js"></script>
    <script>
        document.getElementById('drop-zone').addEventListener('click', () => {
            document.getElementById('file-input').click();
        });
    </script>
</body>
</html>
